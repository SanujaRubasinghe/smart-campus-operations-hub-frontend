name: Frontend CI

on:
  push:
    branches: [ "main", "master", "test/integrate" ]
  pull_request:
    branches: [ "main", "master", "test/integrate" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: './package-lock.json'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build
      run: npm run build
      
    # Vite templates don't include jest/vitest by default, but this hook is ready for when they do.
    # - name: Run tests
    #   run: npm test
